<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Leaderboard - Live Timing</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
    
    html, body {
      background-color: #000000 !important;
      color: #f5f5f5 !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
    }

    #root {
      width: 100%;
    }

    /* Target their tables through cascading */
    table {
      width: 100% !important;
      border-collapse: collapse !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 13px !important;
    }
    
    th {
      background-color: #111 !important;
      color: #888 !important;
      border-bottom: 1px solid #333 !important;
      padding: 8px 12px !important;
      text-transform: uppercase !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      letter-spacing: 0.5px !important;
    }

    td {
      background-color: transparent !important;
      border-bottom: 1px solid #222 !important;
      padding: 6px 12px !important;
    }

    tr:hover td {
      background-color: #1a1a1a !important;
    }

    tr.active td {
      background-color: rgba(225, 29, 72, 0.1) !important;
    }

    /* Common light theme overrides */
    .bg-white { background-color: #000 !important; }
    .text-black, .text-gray-900 { color: #fff !important; }
    .text-gray-500, .text-gray-600 { color: #aaa !important; }
    .border-gray-200 { border-color: #333 !important; }
    
    /* Highlight colors for racing classes or sectors */
    .text-purple-600 { color: #c084fc !important; }
    .text-green-600 { color: #4ade80 !important; }
    .text-red-600 { color: #ef4444 !important; }
    .text-yellow-600 { color: #facc15 !important; }

    /* Hide any big headers from the original */
    header, .navbar { display: none !important; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://livetiming.azurewebsites.net/vendor.aec0.bundle.js"></script>
  <script src="https://livetiming.azurewebsites.net/leaderboard.e24a.bundle.js"></script>
</body>
</html>
